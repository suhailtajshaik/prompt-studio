services:
  prompt-studio:
    container_name: prompt-studio
    build: .
    ports:
      - "3000:80"
    depends_on:
      localai:
        condition: service_healthy
    restart: unless-stopped

  localai:
    container_name: localai
    image: localai/localai:latest-aio-cpu
    ports:
      - "8080:8080"
    environment:
      - LOCALAI_MODELS_PATH=/models
      - DEBUG=true
    volumes:
      - localai-models:/models
      - ./models:/models-config:ro
    entrypoint: >
      /bin/sh -c '
        echo "Copying model configs..."
        cp /models-config/*.yaml /models/ 2>/dev/null || true
        echo "Starting LocalAI..."
        exec /entrypoint.sh "$$@"
      '
    command: ["local-ai"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/readyz"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 600s
    restart: unless-stopped

  # GPU-accelerated variant (use with: docker compose --profile gpu up)
  localai-gpu:
    container_name: localai-gpu
    image: localai/localai:latest-aio-gpu-nvidia-cuda-12
    profiles:
      - gpu
    ports:
      - "8080:8080"
    environment:
      - LOCALAI_MODELS_PATH=/models
      - DEBUG=true
    volumes:
      - localai-models:/models
      - ./models:/models-config:ro
    entrypoint: >
      /bin/sh -c '
        echo "Copying model configs..."
        cp /models-config/*.yaml /models/ 2>/dev/null || true
        echo "Starting LocalAI..."
        exec /entrypoint.sh "$$@"
      '
    command: ["local-ai"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/readyz"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 600s
    restart: unless-stopped

volumes:
  localai-models:
