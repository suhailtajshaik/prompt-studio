services:
  prompt-studio:
    build: .
    ports:
      - "3000:80"
    depends_on:
      localai:
        condition: service_healthy
    restart: unless-stopped

  localai:
    image: localai/localai:latest-aio-cpu
    ports:
      - "8080:8080"
    environment:
      - MODELS_PATH=/build/models
      - DEBUG=true
      - PRELOAD_MODELS=[{"url":"github:mudler/LocalAI/gallery/llama3.yaml","name":"llama3"},{"url":"github:mudler/LocalAI/gallery/mistral-openorca.yaml","name":"mistral-openorca"},{"url":"github:mudler/LocalAI/gallery/phi-2.yaml","name":"phi-2"},{"url":"github:mudler/LocalAI/gallery/gpt-4.yaml","name":"gpt-4"}]
    volumes:
      - localai-models:/build/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/readyz"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  # GPU-accelerated variant (use with: docker compose --profile gpu up)
  localai-gpu:
    image: localai/localai:latest-aio-gpu-nvidia-cuda-12
    profiles:
      - gpu
    ports:
      - "8080:8080"
    environment:
      - MODELS_PATH=/build/models
      - DEBUG=true
      - PRELOAD_MODELS=[{"url":"github:mudler/LocalAI/gallery/llama3.yaml","name":"llama3"},{"url":"github:mudler/LocalAI/gallery/mistral-openorca.yaml","name":"mistral-openorca"},{"url":"github:mudler/LocalAI/gallery/phi-2.yaml","name":"phi-2"},{"url":"github:mudler/LocalAI/gallery/gpt-4.yaml","name":"gpt-4"}]
    volumes:
      - localai-models:/build/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/readyz"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

volumes:
  localai-models:
